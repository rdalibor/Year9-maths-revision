<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Year 9 Maths Mastery</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #202124; line-height: 1.5; }
        .header { background: #1a73e8; color: white; padding: 20px 15px; text-align: center; }
        .stats-bar { background: #e8f0fe; padding: 10px; text-align: center; font-weight: bold; color: var(--primary); border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 101; }
        .nav-container { position: sticky; top: 40px; background: white; padding: 10px 5px; border-bottom: 1px solid #ddd; display: flex; overflow-x: auto; z-index: 100; }
        .nav-btn { margin: 0 4px; padding: 8px 15px; border-radius: 20px; border: 1px solid #ddd; background: #f1f3f4; white-space: nowrap; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .unit-section { display: none; }
        .unit-section.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .opt-btn { padding: 14px; border: 2px solid #eee; border-radius: 10px; background: white; text-align: left; font-size: 1rem; cursor: pointer; }
        .opt-btn.selected { background: #e8f0fe; border-color: var(--primary); color: var(--primary); font-weight: bold; }
        .session-nav { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .nav-move-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .next-btn { background: var(--primary); color: white; }
        .back-btn { background: #dadce0; color: #3c4043; }
        .tip-toggle { background: none; border: none; color: #e67e22; font-weight: bold; margin-top: 15px; cursor: pointer; width: 100%; text-align: left; padding: 0; }
        .tip-box { display: none; margin-top: 10px; padding: 12px; background: #fffde7; border-left: 4px solid #fbc02d; font-size: 0.9rem; border-radius: 4px; }
        .footer-card { background: #202124; color: white; border-radius: 15px; padding: 25px; text-align: center; margin-top: 30px; }
        .email-input { width: 90%; padding: 14px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 1rem; }
        .submit-btn { background: #34a853; color: white; border: none; width: 90%; padding: 16px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:1.4rem;">Year 9 Maths Mastery</h1>
</div>

<div class="stats-bar">
    Questions Answered: <span id="answered-count">0</span> / 50
</div>

<div class="nav-container" id="topNav">
    <button class="nav-btn active" id="tab1" onclick="showUnit(1)">1: Indices</button>
    <button class="nav-btn" id="tab2" onclick="showUnit(2)">2: Std Form</button>
    <button class="nav-btn" id="tab3" onclick="showUnit(3)">3: Equations</button>
    <button class="nav-btn" id="tab4" onclick="showUnit(4)">4: Algebra</button>
    <button class="nav-btn" id="tab5" onclick="showUnit(5)">5: Graphs</button>
</div>
<nav>
    <a href="index.html" style="margin-right: 20px;">Home</a>
    <a href="Surface-area.html">Surface Area Tasks</a>
</nav>
<div class="container">
    <div id="quiz-content"></div>
    <div id="final-submit" class="footer-card" style="display:none;">
        <h3>Exam Complete?</h3>
        <input type="email" id="userEmail" class="email-input" placeholder="Enter school email...">
        <button class="submit-btn" onclick="finishExam()">Submit & Email Results</button>
    </div>
</div>

<script>
    const examData = [
        // UNIT 1: INDICES
        { u: 1, q: "Simplify \\( a^7 \\times a^3 \\)", o: ["\\( a^{21} \\)", "\\( a^{10} \\)", "\\( a^4 \\)"], a: 1, t: "Indices Law: Add powers when multiplying." },
        { u: 1, q: "Simplify \\( b^8 \\div b^2 \\)", o: ["\\( b^4 \\)", "\\( b^{10} \\)", "\\( b^6 \\)"], a: 2, t: "Indices Law: Subtract powers when dividing." },
        { u: 1, q: "Simplify \\( (x^4)^3 \\)", o: ["\\( x^7 \\)", "\\( x^{12} \\)", "\\( x^{43} \\)"], a: 1, t: "Power of a Power: Multiply indices." },
        { u: 1, q: "What is \\( 5^0 \\)?", o: ["0", "1", "5"], a: 1, t: "Anything to the power of 0 is 1." },
        { u: 1, q: "Evaluate \\( 3^{-2} \\)", o: ["-6", "-9", "\\( \\frac{1}{9} \\)"], a: 2, t: "Negative power means 1 over the positive power." },
        { u: 1, q: "Simplify \\( 2y^2 \\times 4y^5 \\)", o: ["\\( 8y^7 \\)", "\\( 6y^7 \\)", "\\( 8y^{10} \\)"], a: 0, t: "Multiply numbers, add powers." },
        { u: 1, q: "Evaluate \\( \\sqrt{144} \\)", o: ["12", "14", "72"], a: 0, t: "The number that squares to make 144." },
        { u: 1, q: "Simplify \\( 15x^9 \\div 3x^3 \\)", o: ["\\( 5x^3 \\)", "\\( 12x^6 \\)", "\\( 5x^6 \\)"], a: 2, t: "Divide the numbers, subtract powers." },
        { u: 1, q: "Fraction for \\( 4^{-1} \\)", o: ["-4", "\\( \\frac{1}{4} \\)", "0.4"], a: 1, t: "Power of -1 is the reciprocal." },
        { u: 1, q: "Simplify \\( (2a^2)^3 \\)", o: ["\\( 8a^6 \\)", "\\( 6a^6 \\)", "\\( 8a^5 \\)"], a: 0, t: "Cube the coefficient and multiply index." },

        // UNIT 2: STANDARD FORM
        { u: 2, q: "Write 45,000 in Standard Form", o: ["\\( 45 \\times 10^3 \\)", "\\( 4.5 \\times 10^4 \\)", "\\( 4.5^4 \\)"], a: 1, t: "Front number between 1 and 10." },
        { u: 2, q: "Write 0.0007 in Standard Form", o: ["\\( 7 \\times 10^{-4} \\)", "\\( 7 \\times 10^4 \\)", "\\( 0.7 \\times 10^{-3} \\)"], a: 0, t: "Negative power for small decimals." },
        { u: 2, q: "Standard Form for 1,000,000", o: ["\\( 10^6 \\)", "\\( 1 \\times 10^5 \\)", "\\( 10^7 \\)"], a: 0, t: "One million is \\( 10^6 \\)." },
        { u: 2, q: "Convert \\( 5.1 \\times 10^{-3} \\)", o: ["0.051", "5100", "0.0051"], a: 2, t: "Move decimal 3 places left." },
        { u: 2, q: "Multiply \\( (2 \\times 10^3) \\times (3 \\times 10^4) \\)", o: ["\\( 6 \\times 10^7 \\)", "\\( 5 \\times 10^7 \\)", "\\( 6 \\times 10^{12} \\)"], a: 0, t: "Multiply constants, add indices." },
        { u: 2, q: "Ordinary number for \\( 3.2 \\times 10^2 \\)", o: ["32", "320", "3200"], a: 1, t: "Move decimal 2 places right." },
        { u: 2, q: "Which is Standard Form?", o: ["\\( 12 \\times 10^2 \\)", "\\( 0.5 \\times 10^3 \\)", "\\( 1.2 \\times 10^2 \\)"], a: 2, t: "Number must start with 1-9." },
        { u: 2, q: "Divide \\( (8 \\times 10^9) \\div (2 \\times 10^3) \\)", o: ["\\( 4 \\times 10^3 \\)", "\\( 4 \\times 10^6 \\)", "\\( 6 \\times 10^6 \\)"], a: 1, t: "Divide constants, subtract indices." },
        { u: 2, q: "Sum of \\( (4.1 \\times 10^5) + (2.3 \\times 10^5) \\)", o: ["\\( 6.4 \\times 10^{10} \\)", "\\( 6.4 \\times 10^5 \\)", "\\( 5.4 \\times 10^5 \\)"], a: 1, t: "Add front numbers if powers match." },
        { u: 2, q: "SF for 0.1", o: ["\\( 1 \\times 10^{-1} \\)", "\\( 10^1 \\)", "\\( 1 \\times 10^0 \\)"], a: 0, t: "Move decimal one place right." },

        // UNIT 3: EQUATIONS (Kept mostly text as they are logic-based)
        { u: 3, q: "If signs are same (+ and +), use:", o: ["Add (DSA)", "Subtract (SSS)"], a: 1, t: "SSS - Same Sign Subtract." },
        { u: 3, q: "If signs are different (+ and -), use:", o: ["Add (DSA)", "Subtract (SSS)"], a: 0, t: "DSA - Different Sign Add." },
        { u: 3, q: "Find \\( x \\): \\( x+y=10, x-y=4 \\)", o: ["6", "7", "14"], a: 1, t: "Add them to eliminate y." },
        { u: 3, q: "Find \\( y \\): \\( x+y=10, x-y=4 \\)", o: ["3", "4", "7"], a: 0, t: "Substitute x=7 back in." },
        { u: 3, q: "Substitution: \\( y=2x, x+y=9 \\). Find \\( x \\).", o: ["2", "3", "4.5"], a: 1, t: "Replace y with 2x." },
        { u: 3, q: "Eliminate \\( 3y \\) from \\( 2x+3y=10 \\) and \\( 5x-3y=4 \\):", o: ["Add", "Subtract"], a: 0, t: "Signs are different, so add." },
        { u: 3, q: "Solve \\( 2x=10 \\)", o: ["2", "5", "20"], a: 1, t: "Divide by 2." },
        { u: 3, q: "Step for \\( 3x+y=10 \\) and \\( x+y=4 \\)?", o: ["Add", "Subtract"], a: 1, t: "Both y terms are positive, so subtract." },
        { u: 3, q: "Find \\( y \\) if \\( x=2 \\) and \\( 3x+y=10 \\)", o: ["4", "8", "6"], a: 0, t: "3(2) + y = 10." },
        { u: 3, q: "Simultaneous solutions are where lines:", o: ["Are parallel", "Cross (Intersect)", "Stop"], a: 1, t: "The point where both lines match." },

        // UNIT 4: ALGEBRA
        { u: 4, q: "Expand \\( 4(x+5) \\)", o: ["\\( 4x+5 \\)", "\\( 4x+20 \\)", "\\( x+20 \\)"], a: 1, t: "Multiply 4 by both items." },
        { u: 4, q: "Factorise \\( 6x-12 \\)", o: ["\\( 6(x-2) \\)", "\\( 6(x-12) \\)", "\\( x(6-12) \\)"], a: 0, t: "HCF is 6." },
        { u: 4, q: "Expand \\( x(x+3) \\)", o: ["\\( x^2+3 \\)", "\\( 2x+3 \\)", "\\( x^2+3x \\)"], a: 2, t: "x times x is x-squared." },
        { u: 4, q: "Solve \\( 3x-2=10 \\)", o: ["4", "12", "3"], a: 0, t: "Add 2, then divide by 3." },
        { u: 4, q: "Factorise \\( x^2+5x \\)", o: ["\\( x(x+5) \\)", "\\( 5x(x+1) \\)", "\\( x^2(1+5) \\)"], a: 0, t: "Common factor is x." },
        { u: 4, q: "Expand \\( (x+2)(x+3) \\)", o: ["\\( x^2+5 \\)", "\\( x^2+5x+6 \\)", "\\( 2x+5 \\)"], a: 1, t: "First, Outer, Inner, Last." },
        { u: 4, q: "Rearrange \\( y=x+a \\) for \\( x \\)", o: ["\\( x=y-a \\)", "\\( x=y+a \\)", "\\( x=a-y \\)"], a: 0, t: "Minus a from both sides." },
        { u: 4, q: "Factorise fully \\( 10y-15 \\)", o: ["\\( 10(y-1.5) \\)", "\\( 5(2y-3) \\)", "\\( 2(5y-7.5) \\)"], a: 1, t: "HCF is 5." },
        { u: 4, q: "Solve \\( \\frac{x}{4} = 5 \\)", o: ["1.25", "9", "20"], a: 2, t: "Inverse of divide is multiply." },
        { u: 4, q: "Expand \\( -2(x-4) \\)", o: ["\\( -2x-8 \\)", "\\( -2x+8 \\)", "\\( 2x+8 \\)"], a: 1, t: "-2 times -4 is +8." },

        // UNIT 5: GRAPHS
        { u: 5, q: "Gradient of \\( y=4x+1 \\)?", o: ["4", "1", "x"], a: 0, t: "The 'm' value in y=mx+c." },
        { u: 5, q: "Y-intercept of \\( y=2x-7 \\)?", o: ["2", "7", "-7"], a: 2, t: "The 'c' value." },
        { u: 5, q: "Formula for Speed?", o: ["\\( D \\times T \\)", "\\( D \\div T \\)", "\\( T \\div D \\)"], a: 1, t: "Distance / Time." },
        { u: 5, q: "Flat line on Distance-Time graph means:", o: ["Fast", "Stationary", "Slow"], a: 1, t: "Distance is not changing." },
        { u: 5, q: "Gradient of a Distance-Time graph is:", o: ["Time", "Distance", "Speed"], a: 2, t: "Change in distance over time." },
        { u: 5, q: "Speed for 20 miles in 2 hours?", o: ["40mph", "10mph", "22mph"], a: 1, t: "20 / 2 = 10." },
        { u: 5, q: "Parallel to \\( y=3x+5 \\)?", o: ["\\( y=3x-2 \\)", "\\( y=2x+5 \\)", "\\( y=-3x+1 \\)"], a: 0, t: "Must have the same gradient (3)." },
        { u: 5, q: "Distance: Speed 10mph, Time 3 hours?", o: ["3.3", "13", "30"], a: 2, t: "Speed x Time." },
        { u: 5, q: "Gradient formula:", o: ["\\( \\frac{Rise}{Run} \\)", "\\( \\frac{Run}{Rise} \\)", "\\( Rise \\times Run \\)"], a: 0, t: "Vertical / Horizontal." },
        { u: 5, q: "Line \\( y=x \\) passes through:", o: ["(0,1)", "(1,0)", "(0,0)"], a: 2, t: "The origin." }
    ];

    let results = {};
    let currentUnit = 1;

    // Helper to make email readable without LaTeX code
    function cleanMath(text) {
        return text.replace(/\\\( /g, "").replace(/ \\\)/g, "").replace(/\\times/g, "x").replace(/\\div/g, "/").replace(/\\frac\{(.+)\}\{(.+)\}/g, "$1/$2").replace(/\\sqrt\{(.+)\}/g, "sqrt($1)").replace(/\\/g, "");
    }

    function showUnit(u) {
        currentUnit = u;
        document.querySelectorAll('.unit-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('unit-' + u).classList.add('active');
        document.getElementById('tab' + u).classList.add('active');
        document.getElementById('final-submit').style.display = (u === 5 ? 'block' : 'none');
        if (window.MathJax) MathJax.typesetPromise();
        window.scrollTo(0,0);
    }

    const content = document.getElementById('quiz-content');
    for(let u=1; u<=5; u++) {
        const section = document.createElement('div');
        section.id = 'unit-' + u;
        section.className = 'unit-section' + (u===1 ? ' active' : '');
        
        examData.filter(d => d.u === u).forEach((item, i) => {
            section.innerHTML += `
                <div class="card">
                    <span style="font-weight:700; color:#1a73e8;">Q${i+1}</span>
                    <span style="font-size:1.1rem; display:block; margin:10px 0;">${item.q}</span>
                    <div class="options">
                        ${item.o.map((opt, idx) => `<button class="opt-btn" onclick="select(this, ${u}, ${i}, ${idx})">${opt}</button>`).join('')}
                    </div>
                    <button class="tip-toggle" onclick="toggleTip(this)">💡 Tip</button>
                    <div class="tip-box">${item.t}</div>
                </div>`;
        });

        const navDiv = document.createElement('div');
        navDiv.className = 'session-nav';
        if (u > 1) navDiv.innerHTML += `<button class="nav-move-btn back-btn" onclick="showUnit(${u-1})">← Back</button>`;
        if (u < 5) navDiv.innerHTML += `<button class="nav-move-btn next-btn" onclick="showUnit(${u+1})">Next Unit →</button>`;
        section.appendChild(navDiv);
        content.appendChild(section);
    }

    function select(btn, u, qIdx, aIdx) {
        btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const unitData = examData.filter(d => d.u === u);
        results[`${u}-${qIdx}`] = {
            correct: (aIdx === unitData[qIdx].a),
            question: unitData[qIdx].q,
            choice: unitData[qIdx].o[aIdx]
        };
        document.getElementById('answered-count').innerText = Object.keys(results).length;
    }

    function toggleTip(btn) {
        const box = btn.nextElementSibling;
        box.style.display = (box.style.display === 'block' ? 'none' : 'block');
    }

    function finishExam() {
        const email = document.getElementById('userEmail').value;
        if(!email) return alert("Please enter email!");
        
        let score = Object.values(results).filter(v => v.correct).length;
        let report = `Year 9 Maths Mastery Report\nScore: ${score}/50\n\n--- ANSWERS ---\n`;
        
        Object.keys(results).forEach(key => {
            const res = results[key];
            report += `Q: ${cleanMath(res.question)}\nYour Answer: ${cleanMath(res.choice)} (${res.correct ? "✅" : "❌"})\n\n`;
        });

        window.location.href = `mailto:${email}?subject=Maths Mastery Results&body=${encodeURIComponent(report)}`;
    }
</script>
</body>
</html>
